<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إتمام الدفع | Iron Trainer</title>
<link rel="stylesheet" href="/api/public/css/admin.css">
<style>
  .checkout-container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
  .checkout-header { text-align: center; margin-bottom: 2rem; }
  .checkout-header h1 { font-size: 1.75rem; font-weight: 800; color: var(--black); }
  .checkout-header p { color: var(--gray-500); margin-top: 0.5rem; }
  .payment-methods { display: flex; flex-direction: column; gap: 1rem; }
  .payment-method-card {
    background: var(--white); border: 2px solid var(--gray-200); border-radius: 12px;
    padding: 1.25rem; cursor: pointer; transition: all 0.25s; position: relative;
  }
  .payment-method-card:hover { border-color: var(--gray-300); }
  .payment-method-card.selected {
    border-color: var(--red); box-shadow: 0 0 0 3px rgba(204,0,0,0.1);
  }
  .payment-method-card .radio-circle {
    width: 22px; height: 22px; border: 2px solid var(--gray-300); border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;
  }
  .payment-method-card.selected .radio-circle { border-color: var(--red); background: var(--red); }
  .payment-method-card.selected .radio-circle::after {
    content: ''; width: 8px; height: 8px; background: var(--white); border-radius: 50%;
  }
  .method-header { display: flex; align-items: center; gap: 1rem; }
  .method-header .method-info { flex: 1; }
  .method-header .method-info h3 { font-size: 1rem; font-weight: 700; }
  .method-header .method-info .method-type-label { font-size: 0.8rem; color: var(--gray-500); }
  .method-icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0;
  }
  .method-icon.bank { background: #fef3c7; color: #92400e; }
  .method-icon.card { background: #dbeafe; color: #1e40af; }
  .method-icon.wallet { background: #d1fae5; color: #065f46; }
  .bank-details {
    display: none; margin-top: 1rem; padding: 1.25rem;
    background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 10px;
  }
  .payment-method-card.selected .bank-details { display: block; }
  .bank-details h4 { font-size: 0.95rem; font-weight: 700; color: var(--gray-800); margin-bottom: 1rem; }
  .bank-details .detail-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.6rem 0; border-bottom: 1px solid var(--gray-100); font-size: 0.9rem;
  }
  .bank-details .detail-row:last-child { border-bottom: none; }
  .bank-details .detail-label { color: var(--gray-500); font-weight: 500; }
  .bank-details .detail-value { color: var(--gray-800); font-weight: 700; text-align: left; direction: ltr; }
  .bank-details .detail-value.ar { direction: rtl; text-align: right; }
  .bank-details .note-box {
    margin-top: 1rem; padding: 0.75rem 1rem; background: #fef3c7; border-radius: 8px;
    font-size: 0.85rem; color: #92400e; line-height: 1.6;
  }
  .bank-details .note-box.usd-note { background: #dbeafe; color: #1e40af; }
  .bank-details .instructions-box {
    margin-top: 1rem; padding: 0.75rem 1rem; background: var(--red); color: var(--white);
    border-radius: 8px; font-size: 0.85rem; font-weight: 600; text-align: center;
  }
  .btn-place-order {
    display: block; width: 100%; padding: 1rem; background: var(--red); color: var(--white);
    border: none; border-radius: 12px; font-family: 'Cairo', sans-serif;
    font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 1.5rem; transition: background 0.2s;
    text-decoration: none; text-align: center;
  }
  .btn-place-order:hover { background: #a30000; }
  .btn-place-order:disabled { opacity: 0.5; cursor: not-allowed; }
  .back-link {
    display: inline-flex; align-items: center; gap: 0.5rem;
    color: var(--gray-500); font-size: 0.9rem; margin-bottom: 1.5rem; text-decoration: none;
  }
  .back-link:hover { color: var(--red); }
  .loading { text-align: center; padding: 3rem; color: var(--gray-400); }
  @media (max-width: 600px) { .checkout-container { margin: 1rem auto; } }
</style>
</head>
<body>

<div class="checkout-container">
  <a href="/" class="back-link">&rarr; العودة للرئيسية</a>

  <div class="checkout-header">
    <img src="/assets/logo.png" alt="Iron Trainer" style="height:48px;margin-bottom:1rem" onerror="this.style.display='none'">
    <h1>اختر طريقة الدفع</h1>
    <p>اختر طريقة الدفع المناسبة لك لإتمام الاشتراك</p>
  </div>

  <div id="methodsContainer" class="payment-methods">
    <div class="loading">جاري تحميل طرق الدفع...</div>
  </div>

  <button class="btn-place-order" id="placeOrderBtn" onclick="placeOrder()" disabled>
    تأكيد الطلب
  </button>
</div>

<script>
const API = '/api/payment-methods/active';
let selectedMethodId = null;
let methods = [];

async function loadMethods() {
  try {
    const res = await fetch(API);
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    methods = json.data;
    renderMethods();
  } catch (err) {
    document.getElementById('methodsContainer').innerHTML =
      '<div class="loading" style="color:var(--red)">خطأ في تحميل طرق الدفع</div>';
  }
}

function getTypeClass(type) {
  if (type === 'bank_transfer') return 'bank';
  if (type === 'card') return 'card';
  if (type === 'instapay') return 'wallet';
  return 'wallet';
}

function getTypeLabel(type) {
  const labels = {
    bank_transfer: 'تحويل بنكي',
    card: 'بطاقة ائتمان / مدى',
    wallet: 'محفظة إلكترونية',
    instapay: 'انستا باي'
  };
  return labels[type] || type;
}

function renderMethods() {
  const container = document.getElementById('methodsContainer');

  if (methods.length === 0) {
    container.innerHTML = '<div class="loading">لا توجد طرق دفع متاحة حالياً</div>';
    return;
  }

  container.innerHTML = methods.map(m => {
    const s = m.settings || {};
    const isBank = m.type === 'bank_transfer';

    let bankHtml = '';
    if (isBank) {
      const egp = (s.accounts || []).find(a => a.currency === 'EGP');
      const usd = (s.accounts || []).find(a => a.currency === 'USD');

      bankHtml = '<div class="bank-details">' +
        '<h4>' + (s.bank_name || '') + ' - بيانات التحويل</h4>' +
        '<div class="detail-row"><span class="detail-label">اسم الشركة</span><span class="detail-value ar">' + (s.account_holder_ar || '') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">Company Name</span><span class="detail-value">' + (s.account_holder_en || '') + '</span></div>';

      if (egp && egp.account_number) {
        bankHtml +=
          '<h4 style="margin-top:1rem;font-size:0.85rem;color:var(--gray-500)">&#9733; حساب الجنيه المصري (EGP)</h4>' +
          '<div class="detail-row"><span class="detail-label">رقم الحساب</span><span class="detail-value">' + egp.account_number + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">IBAN</span><span class="detail-value">' + egp.iban + '</span></div>';
        if (egp.note) bankHtml += '<div class="note-box">' + egp.note + '</div>';
      }

      if (usd && usd.account_number) {
        bankHtml +=
          '<h4 style="margin-top:1rem;font-size:0.85rem;color:var(--gray-500)">&#9733; حساب الدولار الأمريكي (USD)</h4>' +
          '<div class="detail-row"><span class="detail-label">رقم الحساب</span><span class="detail-value">' + usd.account_number + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">IBAN</span><span class="detail-value">' + usd.iban + '</span></div>';
        if (usd.note) bankHtml += '<div class="note-box usd-note">' + usd.note + '</div>';
      }

      if (s.swift_code) {
        bankHtml += '<div class="detail-row"><span class="detail-label">Swift Code</span><span class="detail-value">' + s.swift_code + '</span></div>';
      }

      if (s.instructions) {
        bankHtml += '<div class="instructions-box">' + s.instructions + '</div>';
      }
      bankHtml += '</div>';
    }

    return '<div class="payment-method-card" data-id="' + m.id + '" onclick="selectMethod(' + m.id + ')">' +
      '<div class="method-header">' +
        '<div class="radio-circle"></div>' +
        '<div class="method-icon ' + getTypeClass(m.type) + '">&#9733;</div>' +
        '<div class="method-info">' +
          '<h3>' + m.name + '</h3>' +
          '<div class="method-type-label">' + getTypeLabel(m.type) + '</div>' +
        '</div>' +
      '</div>' +
      bankHtml +
    '</div>';
  }).join('');
}

function selectMethod(id) {
  selectedMethodId = id;
  document.querySelectorAll('.payment-method-card').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.id) === id);
  });
  document.getElementById('placeOrderBtn').disabled = false;
}

function placeOrder() {
  if (!selectedMethodId) return;
  const method = methods.find(m => m.id === selectedMethodId);
  if (!method) return;

  if (method.type === 'bank_transfer') {
    alert('تم اختيار التحويل البنكي.\n\nيرجى تحويل المبلغ على الحسابات الموضحة أعلاه وإرسال إثبات الدفع للواتساب.\n\nسيتم مراجعة طلبك وتفعيل اشتراكك فور تأكيد الدفع.');
  } else if (method.type === 'card') {
    alert('سيتم توجيهك إلى بوابة الدفع الآمن لإتمام عملية الدفع.');
  } else {
    alert('سيتم توجيهك إلى المحفظة الإلكترونية لإتمام الدفع.');
  }
}

loadMethods();
</script>
</body>
</html>
